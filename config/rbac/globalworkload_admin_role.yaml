# This rule is not used by the project global-workload-orchestrator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over platform.platform.local.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: global-workload-orchestrator
    app.kubernetes.io/managed-by: kustomize
  name: globalworkload-admin-role
rules:
- apiGroups:
  - platform.platform.local
  resources:
  - globalworkloads
  verbs:
  - '*'
- apiGroups:
  - platform.platform.local
  resources:
  - globalworkloads/status
  verbs:
  - get
